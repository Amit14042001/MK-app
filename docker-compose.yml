version: '3.9'

networks:
  mk_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
  nginx_logs:

services:

  mongo:
    image: mongo:7.0
    container_name: mk_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-supersecret}
      MONGO_INITDB_DATABASE: mk-app
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      mk_network:
        ipv4_address: 172.20.0.10
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: mk_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      mk_network:
        ipv4_address: 172.20.0.11
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli --pass ${REDIS_PASSWORD:-redissecret} ping
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mk_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-supersecret}@mongo:27017/mk-app?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
    volumes:
      - backend_uploads:/app/uploads
    networks:
      mk_network:
        ipv4_address: 172.20.0.20
    expose:
      - "5000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5000/api/v1/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api/v1}
        REACT_APP_SOCKET_URL: ${REACT_APP_SOCKET_URL:-}
        REACT_APP_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY:-}
        REACT_APP_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY:-}
        REACT_APP_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID:-}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID:-}
    container_name: mk_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      mk_network:
        ipv4_address: 172.20.0.30
    expose:
      - "80"

  nginx:
    image: nginx:1.25-alpine
    container_name: mk_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      mk_network:
        ipv4_address: 172.20.0.40

  # Dev tools (only with: docker-compose --profile dev up)
  mongo-express:
    image: mongo-express
    profiles: ["dev"]
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-supersecret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-supersecret}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: mkadmin
      ME_CONFIG_BASICAUTH_PASSWORD: mkpass123
    ports:
      - "8081:8081"
    networks: [mk_network]
