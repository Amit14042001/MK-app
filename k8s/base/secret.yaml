# MK App — Kubernetes Secrets (template — replace values with base64 encoded strings)
apiVersion: v1
kind: Secret
metadata:
  name: mk-app-secrets
  namespace: default
  labels:
    app: mk-app
type: Opaque
stringData:
  # MongoDB
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/mkapp"
  # JWT
  JWT_SECRET: "change-this-to-a-secure-random-string-min-32-chars"
  JWT_REFRESH_SECRET: "change-this-to-another-secure-random-string"
  # Razorpay
  RAZORPAY_KEY_ID: "rzp_live_xxxxxxxxxxxxxxxxxx"
  RAZORPAY_KEY_SECRET: "xxxxxxxxxxxxxxxxxxxxxxxx"
  RAZORPAY_WEBHOOK_SECRET: "your_webhook_secret"
  # Stripe
  STRIPE_SECRET_KEY: "sk_live_xxxxxxxxxxxxxxxxxx"
  STRIPE_WEBHOOK_SECRET: "whsec_xxxxxxxxxxxxxxxxxx"
  # Firebase
  FIREBASE_PROJECT_ID: "mk-app-prod"
  FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----"
  FIREBASE_CLIENT_EMAIL: "firebase-adminsdk@mk-app-prod.iam.gserviceaccount.com"
  # Twilio
  TWILIO_ACCOUNT_SID: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TWILIO_AUTH_TOKEN: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TWILIO_PHONE_NUMBER: "+1xxxxxxxxxx"
  # Redis
  REDIS_URL: "redis://mk-redis:6379"
  REDIS_PASSWORD: ""
  # Agora
  AGORA_APP_ID: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  AGORA_APP_CERTIFICATE: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # Anthropic (AI Chat)
  ANTHROPIC_API_KEY: "sk-ant-api03-xxxxxxxxxxxxxxxx"
  # WhatsApp
  WHATSAPP_ACCESS_TOKEN: "your_whatsapp_access_token"
  WHATSAPP_PHONE_NUMBER_ID: "your_phone_number_id"
  WHATSAPP_VERIFY_TOKEN: "your_webhook_verify_token"
  # Google OAuth
  GOOGLE_WEB_CLIENT_ID: "xxxxxxxxxx.apps.googleusercontent.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: mk-redis-secret
  namespace: default
type: Opaque
stringData:
  redis-password: ""
