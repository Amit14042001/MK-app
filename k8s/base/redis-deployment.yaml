# MK App — Redis StatefulSet + PVC
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mk-redis
  labels:
    app: mk-app
    component: redis
spec:
  serviceName: mk-redis
  replicas: 1
  selector:
    matchLabels:
      app: mk-redis
  template:
    metadata:
      labels:
        app: mk-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --save 60 1
            - --loglevel warning
            - --maxmemory 512mb
            - --maxmemory-policy allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
# Redis Exporter for Prometheus metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  labels:
    app: mk-app
    component: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          ports:
            - containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://mk-redis:6379
