# ── MK App — Kubernetes Manifests ───────────────────────────
# Apply: kubectl apply -f k8s/base/
# Production: kubectl apply -k k8s/overlays/production/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mk-app
  labels:
    app.kubernetes.io/name: mk-app
    environment: production

---
# ConfigMap — non-secret config
apiVersion: v1
kind: ConfigMap
metadata:
  name: mk-app-config
  namespace: mk-app
data:
  NODE_ENV:           "production"
  PORT:               "5000"
  FRONTEND_URL:       "https://mkapp.in"
  ENABLE_CACHE:       "true"
  ENABLE_RATE_LIMITING: "true"
  RATE_LIMIT_WINDOW:  "15"
  RATE_LIMIT_MAX:     "200"

---
# Secret — sensitive credentials (base64 encoded in production)
apiVersion: v1
kind: Secret
metadata:
  name: mk-app-secrets
  namespace: mk-app
type: Opaque
stringData:
  MONGO_URI:            "mongodb+srv://user:pass@cluster.mongodb.net/mk-app"
  REDIS_URL:            "redis://:password@redis-service:6379"
  JWT_SECRET:           "REPLACE_WITH_64_CHAR_SECRET"
  JWT_REFRESH_SECRET:   "REPLACE_WITH_ANOTHER_64_CHAR_SECRET"
  RAZORPAY_KEY_ID:      "rzp_live_XXXXXXXXXX"
  RAZORPAY_KEY_SECRET:  "XXXXXXXXXXXXXXXXXXXXXXXXXX"
  TWILIO_ACCOUNT_SID:   "ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  TWILIO_AUTH_TOKEN:    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  TWILIO_PHONE_NUMBER:  "+1XXXXXXXXXX"
  FIREBASE_PROJECT_ID:  "mk-app-prod"
  FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
  FIREBASE_CLIENT_EMAIL: "firebase-adminsdk@mk-app.iam.gserviceaccount.com"
  GOOGLE_MAPS_KEY:      "AIzaSy..."

---
# PersistentVolumeClaim — for uploaded files
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mk-uploads-pvc
  namespace: mk-app
spec:
  accessModes: [ReadWriteMany]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk-backend
  namespace: mk-app
  labels:
    app:       mk-backend
    component: api
    version:   v1
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mk-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0    # Zero-downtime deployments
  template:
    metadata:
      labels:
        app:       mk-backend
        component: api
        version:   v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/api/v1/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mk-backend
          image: ghcr.io/mkapp/mk-app-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: mk-app-config
            - secretRef:
                name: mk-app-secrets
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: mk-uploads-pvc
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: mk-backend

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: mk-backend-svc
  namespace: mk-app
  labels:
    app: mk-backend
spec:
  selector:
    app: mk-backend
  ports:
    - port:       5000
      targetPort: 5000
      protocol:   TCP
      name:       http

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk-frontend
  namespace: mk-app
  labels:
    app:       mk-frontend
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mk-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mk-frontend
    spec:
      containers:
        - name: mk-frontend
          image: ghcr.io/mkapp/mk-app-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: mk-frontend-svc
  namespace: mk-app
spec:
  selector:
    app: mk-frontend
  ports:
    - port: 80
      targetPort: 80

---
# HorizontalPodAutoscaler — backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mk-backend-hpa
  namespace: mk-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mk-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageUtilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# HPA — frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mk-frontend-hpa
  namespace: mk-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mk-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 70

---
# Ingress — routes traffic to frontend + backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mk-app-ingress
  namespace: mk-app
  annotations:
    kubernetes.io/ingress.class:             nginx
    cert-manager.io/cluster-issuer:         letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # WebSocket support for Socket.IO
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # HSTS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - mkapp.in
        - www.mkapp.in
        - api.mkapp.in
      secretName: mk-app-tls
  rules:
    - host: api.mkapp.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mk-backend-svc
                port:
                  number: 5000
    - host: mkapp.in
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: mk-backend-svc
                port:
                  number: 5000
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: mk-backend-svc
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mk-frontend-svc
                port:
                  number: 80

---
# PodDisruptionBudget — ensure availability during node maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mk-backend-pdb
  namespace: mk-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mk-backend

---
# NetworkPolicy — restrict inter-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mk-backend-netpol
  namespace: mk-app
spec:
  podSelector:
    matchLabels:
      app: mk-backend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: mk-frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
  egress:
    - {}  # Allow all outbound (MongoDB Atlas, Redis, Firebase, Razorpay, Twilio)
