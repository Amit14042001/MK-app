# MK App ConfigMap — non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: mk-app-config
  namespace: mk-app
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  ENABLE_RATE_LIMITING: "true"
  AUTO_SEED: "false"
  FRONTEND_URL: "https://mkapp.in"
  REDIS_URL: "redis://mk-redis-service:6379"
  CORS_ORIGINS: "https://mkapp.in,https://www.mkapp.in"
