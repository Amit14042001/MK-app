apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk-backend
spec:
  template:
    spec:
      containers:
        - name: mk-backend
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mk-frontend
spec:
  template:
    spec:
      containers:
        - name: mk-frontend
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
