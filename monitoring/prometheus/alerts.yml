groups:
  - name: mk-app-alerts
    interval: 30s
    rules:

      # ── API Health ─────────────────────────────────────────
      - alert: BackendDown
        expr: up{job="mk-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team:     platform
        annotations:
          summary:     "MK Backend is DOWN"
          description: "Backend has been unreachable for >1 minute. Immediate action required."
          runbook:     "https://docs.mkapp.in/runbooks/backend-down"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{job="mk-backend",status=~"5.."}[5m])
          /
          rate(http_requests_total{job="mk-backend"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary:     "High error rate on MK Backend"
          description: "Error rate is {{ $value | humanizePercentage }} over last 5m"

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="mk-backend"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Slow API responses (p95 > 2s)"
          description: "95th percentile response time is {{ $value }}s"

      # ── Infrastructure ─────────────────────────────────────
      - alert: HighCPU
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}%"

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanize }}% disk space remaining"

      # ── MongoDB ────────────────────────────────────────────
      - alert: MongoDBDown
        expr: up{job="mongodb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB is DOWN"

      - alert: MongoDBHighConnections
        expr: mongodb_connections{state="current"} > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High MongoDB connections: {{ $value }}"

      # ── Redis ──────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis cache is DOWN — performance degraded"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage >80%: {{ $value | humanize }}%"

      # ── Business Metrics ───────────────────────────────────
      - alert: BookingFailureSpike
        expr: |
          rate(mk_booking_failures_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          team:     product
        annotations:
          summary:     "Spike in booking failures: {{ $value }}/min"
          description: "More than 10 booking failures per minute for 2+ minutes"

      - alert: PaymentFailureRate
        expr: |
          rate(mk_payment_failures_total[5m])
          /
          rate(mk_payment_attempts_total[5m]) > 0.10
        for: 3m
        labels:
          severity: critical
          team:     product
        annotations:
          summary:     "Payment failure rate > 10%: {{ $value | humanizePercentage }}"
          description: "High payment failure rate — check Razorpay integration"

      - alert: NoBookingsCreated
        expr: |
          sum(increase(mk_bookings_created_total[30m])) == 0
        for: 30m
        labels:
          severity: warning
          team:     product
        annotations:
          summary: "No bookings created in 30 minutes"
          description: "Zero bookings in 30 minutes — possible issue with booking flow"

      - alert: LowProfessionalsOnline
        expr: mk_professionals_online < 5
        for: 10m
        labels:
          severity: warning
          team:     ops
        annotations:
          summary:     "Only {{ $value }} professionals online"
          description: "Very few professionals online — customer experience may suffer"
