apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

/**
 * MK Customer App — Android Build Config
 */

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.mkapp"

    defaultConfig {
        applicationId "com.mkapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Multidex (required for Firebase + RN)
        multiDexEnabled true

        // Required for react-native-maps
        missingDimensionStrategy 'react-native-camera', 'general'

        // SMS Retriever hash for OTP autofill
        // Generate with: ./gradlew signingReport
        manifestPlaceholders = [appAuthRedirectScheme: "com.mkapp"]
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Set via environment variables for CI/CD security
            if (System.getenv("KEYSTORE_PATH")) {
                storeFile file(System.getenv("KEYSTORE_PATH"))
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            } else {
                // Fallback: read from local keystore.properties
                def keystorePropsFile = rootProject.file("keystore.properties")
                if (keystorePropsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(keystorePropsFile))
                    storeFile file(props['storeFile'])
                    storePassword props['storePassword']
                    keyAlias props['keyAlias']
                    keyPassword props['keyPassword']
                }
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            versionNameSuffix "-DEBUG"
            resValue "string", "app_name", "MK (Dev)"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            resValue "string", "app_name", "MK"
        }
    }

    buildFeatures {
        buildConfig true
    }

    // Java 11 compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // Fix duplicate files from Firebase
    packagingOptions {
        pickFirst '**/libcrypto.so'
        pickFirst '**/libssl.so'
        pickFirst '**/libjsc.so'
        excludes += ['/META-INF/{AL2.0,LGPL2.1}']
    }
}

react {
    /* Hermes JS engine (faster startup, lower memory) */
    hermesEnabled = true
    /* Enable new arch */
    newArchEnabled = false
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // AndroidX
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.12.0"

    // Firebase (BoM manages all versions)
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-crashlytics'

    // Google Maps
    implementation 'com.google.android.gms:play-services-maps:18.2.0'
    implementation 'com.google.android.gms:play-services-location:21.1.0'

    // Razorpay
    implementation 'com.razorpay:checkout:1.6.33'
}

// Enable Proguard in release builds (set in gradle.properties)
def enableProguardInReleaseBuilds = project.hasProperty('enableProguardInReleaseBuilds') \
    ? project.enableProguardInReleaseBuilds : false
