      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: professional-app/package-lock.json

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: professional-app/ios/Pods
          key: pods-pro-${{ hashFiles('professional-app/ios/Podfile.lock') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PRO }}' | base64 -d > ios/MKPro/GoogleService-Info.plist

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update
        env:
          NO_FLIPPER: '1'

      - name: Build for simulator
        run: |
          xcodebuild \
            -workspace ios/MKPro.xcworkspace \
            -scheme MKPro \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build | xcpretty --color

# ════════════════════════════════════════════════════════════════
# JOB 7 — Deploy to Production (on release tag)
# ════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy — Production
    runs-on: ubuntu-latest
    needs: [backend-docker, frontend-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e
            cd /opt/mk-app

            # Pull latest images
            docker pull ${{ env.IMAGE_PREFIX }}-backend:latest
            docker pull ${{ env.IMAGE_PREFIX }}-frontend:latest

            # Zero-downtime rolling restart
            docker-compose up -d --no-deps --scale backend=2 backend
            sleep 15
            docker-compose up -d --no-deps --scale backend=1 backend

            # Restart frontend
            docker-compose up -d --no-deps frontend

            # Health check
            sleep 10
            curl -f http://localhost:5000/api/v1/health || exit 1

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed ${{ github.ref_name }} to production"

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text:   "MK App ${{ github.ref_name }} deployed to production"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

# ════════════════════════════════════════════════════════════════
# JOB 8 — Deploy to Staging (on main push)
# ════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🎭 Deploy — Staging
    runs-on: ubuntu-latest
    needs: [backend-docker, frontend-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/mk-app-staging
            docker-compose pull
            docker-compose up -d
            sleep 8
            curl -f http://localhost:5000/api/v1/health || exit 1
            echo "✅ Staging updated"

# ════════════════════════════════════════════════════════════════
# Required GitHub Secrets:
# GOOGLE_SERVICES_JSON          - Customer Android Firebase config (JSON)
# GOOGLE_SERVICES_JSON_PRO      - Professional Android Firebase config (JSON)
# GOOGLE_SERVICE_INFO_PLIST     - Customer iOS Firebase config (base64)
# GOOGLE_SERVICE_INFO_PLIST_PRO - Professional iOS Firebase config (base64)
# RELEASE_KEYSTORE_BASE64       - Android release keystore (base64)
# KEYSTORE_PASSWORD             - Keystore password
# KEY_ALIAS                     - Key alias
# KEY_PASSWORD                  - Key password
# REACT_APP_API_URL             - Production API URL
# GOOGLE_MAPS_KEY               - Google Maps API key
# FIREBASE_PROJECT_ID           - Firebase project ID
# PROD_HOST / PROD_USER / PROD_SSH_KEY / PROD_PORT
# STAGING_HOST / STAGING_USER / STAGING_SSH_KEY
# SLACK_WEBHOOK                 - Slack notifications
# ════════════════════════════════════════════════════════════════
